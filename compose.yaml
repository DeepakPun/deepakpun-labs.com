services:
  client:
    image: pundeepak/portfolio-client:latest
    ports:
      - '3000:3000'

  core-api:
    image: pundeepak/portfolio-core-api:latest
    ports:
      - '3001:3001'
    env_file:
      - .env
    depends_on:
      - mongo

  docs:
    image: pundeepak/portfolio-docs:latest
    ports:
      - '3002:80'

  mongo:
    image: mongo:latest
    expose:
      - '27017'
    volumes:
      - mongo_data:/data/db

  nginx:
    image: nginx:alpine-slim
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /root/portfolio/certbot_etc:/etc/letsencrypt:ro
      - /root/portfolio/certbot_www:/var/www/certbot:ro
    depends_on:
      - client

volumes:
  mongo_data:
