services:
  client:
    image: pundeepak/portfolio-client:${IMAGE_TAG:-latest}
    ports:
      - "3000:3000"

  core-api:
    image: pundeepak/portfolio-core-api:${IMAGE_TAG:-latest}
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - mongo

  docs:
    image: pundeepak/portfolio-docs:${IMAGE_TAG:-latest}
    ports:
      - "3002:80"

  mongo:
    image: mongo:latest
    command: [--auth]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    env_file:
      - .env
    expose:
      - "27017"
    ulimits:
      nofile:
        soft: 64000
        hard: 64000
    volumes:
      - mongo_data:/data/db

  nginx:
    image: nginx:alpine-slim
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /root/portfolio/certbot_etc:/etc/letsencrypt:ro
      - /root/portfolio/certbot_www:/var/www/certbot:ro
    depends_on:
      - client

volumes:
  mongo_data:
