services:
  client:
    build:
      context: ./services/client
      dockerfile: Dockerfile
    ports:
      - '${CLIENT_PORT}:${CLIENT_PORT}'
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}

  core-api:
    build:
      context: ./services/core-api
      dockerfile: Dockerfile
    ports:
      - '${API_PORT}:${API_PORT}'
    env_file:
      - .env

  docs:
    build:
      context: ./services/docs
      dockerfile: Dockerfile
    ports:
      - '${DOCS_PORT}:80'

  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
