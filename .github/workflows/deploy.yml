name: CI/CD Portfolio Auto-Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Docker Meta Configuration
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-client
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-core-api
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-docs
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Build & Push Client
      - name: Build and Push Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/client
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-client:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-client:sha-${{ github.sha }}

      # 2. Build & Push Core API
      - name: Build and Push Core API Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/core-api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-core-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-core-api:sha-${{ github.sha }}

      # 3. Build & Push Docs
      - name: Build and Push Docs Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/docs
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-docs:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-docs:sha-${{ github.sha }}

  deploy-to-droplet:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code (for Compose files)
        uses: actions/checkout@v4

      - name: Copy Deployment Files to Droplet
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: 'compose.yaml,run.sh'
          target: '~/portfolio'

      - name: SSH and Trigger Production Deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd ~/portfolio
            chmod +x run.sh
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            ./run.sh prod
