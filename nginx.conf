# 1. Force Redirect ALL plain HTTP traffic to secure HTTPS server
server {
    listen 80;
    server_name deepakpun-labs.com ://deepakpun-labs.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. Secure HTTPS Server Gateway
server {
    listen 443 ssl;
    server_name deepakpun-labs.com ://deepakpun-labs.com;

    ssl_certificate /etc/letsencrypt/live/deepakpun-labs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deepakpun-labs.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ROUTE: System Docs (/api-docs) straight to your static documentation container (Port 3002)
    # The trailing slash at the end of proxy_pass is critical here!
    location /api-docs/ {
        proxy_pass http://docs:80/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle clean fallback redirection if users forget the trailing slash
    location = /api-docs {
        return 301 $scheme://$host$request_uri/;
    }

    # ROUTE: Secure Reverse Proxy to Next.js Main UI Client (Port 3000)
    location / {
        proxy_pass http://client:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
