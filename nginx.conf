# 1. Force Redirect ALL plain HTTP traffic to secure HTTPS server
server {
    listen 80;
    server_name deepakpun-labs.com ://deepakpun-labs.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. Secure HTTPS Server Gateway
server {
    listen 443 ssl;
    server_name deepakpun-labs.com ://deepakpun-labs.com;

    ssl_certificate /etc/letsencrypt/live/deepakpun-labs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deepakpun-labs.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ROUTE 1: Swagger UI Documentation Interface (Port 3001)
    location /api-docs {
        proxy_pass http://core-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ROUTE 2: Catch all backend API data requests explicitly including /api/v1/
    location /api/ {
        proxy_pass http://core-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Universal CORS proxy headers - ADDED x-api-key HERE
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, x-nextjs-cache, x-api-key' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, x-nextjs-cache, x-api-key';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Content-Length' 0;
            add_header 'Content-Type' text/plain;
            return 204;
        }
    }

    # ROUTE 3: Static React Documentation -> Docs Container (Port 3002)
    location /docs/ {
        proxy_pass http://docs:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle automatic fallback if a user types the domain without the trailing slash
    location = /docs {
        return 301 $scheme://$host$request_uri/;
    }

    # ROUTE 4: Main Next.js App Entrypoint -> Client UI (Port 3000)
    location / {
        proxy_pass http://client:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
