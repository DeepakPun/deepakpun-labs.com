server { 
    listen 80; 
    server_name deepakpun-labs.com ://deepakpun-labs.com; 

    location /.well-known/acme-challenge/ { 
        root /var/www/certbot; 
    } 

    location / { 
        return 301 https://$host$request_uri; 
    } 
} 

# 2. Secure HTTPS Server Gateway 
server { 
    listen 443 ssl; 
    server_name deepakpun-labs.com ://deepakpun-labs.com; 

    # Correct paths targeting mounted folders
    ssl_certificate /etc/letsencrypt/live/://deepakpun-labs.com; 
    ssl_certificate_key /etc/letsencrypt/live/://deepakpun-labs.com; 

    ssl_protocols TLSv1.2 TLSv1.3; 
    ssl_ciphers HIGH:!aNULL:!MD5; 

    # Secure Reverse Proxy to Next.js Client on Port 3000 
    location / { 
        proxy_pass http://client:3000; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        proxy_set_header X-Forwarded-Proto $scheme; 
    } 
}