# 1. Force Redirect ALL plain HTTP traffic to secure HTTPS server
server {
    listen 80;
    server_name deepakpun-labs.com www.deepakpun-labs.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. Secure HTTPS Server Gateway
server {
    listen 443 ssl;
    server_name deepakpun-labs.com www.deepakpun-labs.com;

    ssl_certificate /etc/letsencrypt/live/deepakpun-labs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deepakpun-labs.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ROUTE 1: Swagger UI Documentation Interface (Port 3001)
    location /api-docs {
        proxy_pass http://core-api:3001; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FIX: Route all actual backend API data requests directly to Core-API (Port 3001)
    location /api/ {
        proxy_pass http://core-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Inject CORS headers directly at the proxy layer for the API endpoints
        add_header 'Access-Control-Allow-Origin' 'https://deepakpun-labs.com' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://deepakpun-labs.com';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
            add_header 'Content-Length' 0;
            add_header 'Content-Type' text/plain;
            return 204;
        }
    }

    # ROUTE 2: Static React Documentation -> Docs Container (Port 3002)
    location /docs/ {
        proxy_pass http://docs:80/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle automatic fallback if a user types the domain without the trailing slash
    location = /docs {
        return 301 $scheme://$host$request_uri/;
    }

    # ROUTE 3: Main Next.js App Entrypoint -> Client UI (Port 3000)
    location / {
        proxy_pass http://client:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
